version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    # 加载服务器本地的 .env 文件，包含数据库密码、SECRET_KEY 等
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  # Redis 服务
  redis:
    image: redis:alpine
    restart: always
    # 关键：启动时设置密码
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"