services:
  # 后端服务（从 Docker Hub 拉取镜像）
  backend:
    image: ${DOCKERHUB_USERNAME}/digisoul-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  # Redis 服务
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
