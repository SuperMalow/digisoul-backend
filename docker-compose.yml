services:
  # 后端服务（从 Docker Hub 拉取镜像）
  backend:
    image: ${DOCKERHUB_USERNAME}/digisoul-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - db-data:/app/digisoul/data
      # 绑定到宿主机目录，便于 Nginx 直接提供静态/媒体文件
      - ./media:/app/digisoul/media
      - ./static:/app/digisoul/static
    depends_on:
      - redis

  # Celery 异步任务
  celery:
    image: ${DOCKERHUB_USERNAME}/digisoul-backend:latest
    restart: always
    env_file:
      - .env
    volumes:
      - db-data:/app/digisoul/data
      - ./media:/app/digisoul/media
    command: ["uv", "run", "celery", "-A", "digisoul", "worker", "--loglevel=info", "-P", "threads", "--concurrency=2"]
    depends_on:
      - redis

  # Redis 服务
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis-data:/data

volumes:
  db-data:
  redis-data:
